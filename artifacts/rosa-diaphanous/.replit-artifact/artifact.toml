kind = "web"
previewPath = "/"
title = "Rosa Diaphanous"
version = "1.0.0"
id = "artifacts/rosa-diaphanous"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20035

[services.development]
run = "pnpm --filter @workspace/rosa-diaphanous run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rosa-diaphanous", "run", "build" ]
publicDir = "artifacts/rosa-diaphanous/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20035"
BASE_PATH = "/"
